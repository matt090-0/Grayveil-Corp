<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0c070"/>
      <stop offset="50%" stop-color="#c8a55a"/>
      <stop offset="100%" stop-color="#a08040"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a22"/>
      <stop offset="100%" stop-color="#0e0e14"/>
    </linearGradient>
  </defs>
  <!-- Background hexagon -->
  <polygon points="256,20 476,140 476,372 256,492 36,372 36,140" fill="url(#dark)" stroke="url(#gold)" stroke-width="12"/>
  <!-- Inner border -->
  <polygon points="256,52 452,158 452,354 256,460 60,354 60,158" fill="none" stroke="#c8a55a" stroke-width="2" opacity="0.3"/>
  <!-- Stylized G shape -->
  <path d="M 300,150 L 180,150 C 130,150 100,190 100,240 L 100,280 C 100,330 130,362 180,362 L 300,362 L 300,280 L 210,280 C 195,280 185,270 185,256 L 185,256 C 185,242 195,232 210,232 L 260,232 L 260,280" 
    fill="none" stroke="url(#gold)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Veil slash — the signature cut -->
  <line x1="310" y1="120" x2="370" y2="400" stroke="url(#gold)" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
  <!-- Small accent dot -->
  <circle cx="395" cy="150" r="8" fill="#c8a55a" opacity="0.6"/>
</svg>
