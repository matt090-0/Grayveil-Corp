<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Grayveil Corporation</title>
  <meta name="theme-color" content="#0a0b0f" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: #0a0b0f;
      color: #d4d8e0;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }
    .halo {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, rgba(200,165,90,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      position: relative;
      max-width: 480px; width: 100%;
      background: rgba(15,16,21,0.85);
      border: 1px solid rgba(200,165,90,0.18);
      border-radius: 12px;
      padding: 40px 32px;
      backdrop-filter: blur(20px);
      text-align: center;
      box-shadow: 0 0 60px rgba(200,165,90,0.08);
    }
    .logo {
      width: 56px; height: 56px; margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      filter: drop-shadow(0 0 16px rgba(200,165,90,0.3));
    }
    .label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px; letter-spacing: .3em;
      color: #c8a55a; margin-bottom: 10px;
    }
    h1 {
      font-size: 22px; font-weight: 600;
      color: #f0f2f5; margin: 0 0 12px;
    }
    p { color: #9aa0ac; line-height: 1.55; margin: 0 0 24px; font-size: 14px; }
    button {
      background: transparent; color: #d4d8e0;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; padding: 12px 20px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px; letter-spacing: .2em;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    button:hover { border-color: #c8a55a; color: #c8a55a; }
    .footer {
      margin-top: 24px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 9px; letter-spacing: .25em;
      color: #4a5060;
    }
  </style>
</head>
<body>
  <div class="halo"></div>
  <div class="card">
    <img class="logo" src="/brand/logo.png" alt="" onerror="this.style.display='none'" />
    <div class="label">CONNECTION LOST</div>
    <h1>Uplink interrupted</h1>
    <p>Grayveil can't reach the command relay right now. Check your connection and try again — previously viewed pages may still be accessible offline.</p>
    <button onclick="location.reload()">RETRY UPLINK</button>
    <div class="footer">GRAYVEIL CORPORATION</div>
  </div>
</body>
</html>
